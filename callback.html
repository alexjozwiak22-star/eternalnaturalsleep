<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Auth | EternalNaturalSleep</title>
  <style>
    body { font-family: Georgia, serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #222; line-height: 1.8; text-align: center; }
    h1 { color: #1a3a2a; }
    #code-box { background: #f4f4f4; border: 1px solid #ccc; padding: 16px; border-radius: 6px; font-family: monospace; font-size: 14px; word-break: break-all; margin: 20px 0; }
    button { background: #1a3a2a; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #2a6040; }
  </style>
</head>
<body>
  <h1>Authorization Code</h1>
  <p>Copy the code below and paste it into the terminal when prompted by the authentication script.</p>
  <div id="code-box">Retrieving...</div>
  <button onclick="copyCode()">Copy Code</button>
  <p id="status"></p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code  = params.get('code');
    const error = params.get('error');
    const box   = document.getElementById('code-box');

    if (code) {
      box.textContent = code;
    } else if (error) {
      box.textContent = 'Error: ' + error;
      box.style.color = 'red';
    } else {
      box.textContent = 'No code found in URL.';
    }

    function copyCode() {
      navigator.clipboard.writeText(box.textContent).then(() => {
        document.getElementById('status').textContent = 'Copied!';
      });
    }
  </script>
</body>
</html>
